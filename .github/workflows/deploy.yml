# GitHub Pages deployment workflow for React app
# Builds React app and deploys to GitHub Pages

name: Deploy React App

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Lint source
        run: yarn lint

      - name: Check CSP hash
        run: yarn check:csp

      - name: Build React app
        run: yarn build

  build:
    name: Build GitHub Pages artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Lint source
        run: yarn lint

      - name: Check CSP hash
        run: yarn check:csp

      - name: Build React app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

        with:
          path: './dist'

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      - name: Check for Firebase rules changes
        id: rules-check
        run: |
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
          if echo "$CHANGED_FILES" | grep -qE '(database\.rules\.json|firestore\.rules)'; then
            echo "rules_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rules_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Firebase rules
        if: steps.rules-check.outputs.rules_changed == 'true'
        run: |
          npm install -g firebase-tools@latest
          PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}"

          # Determine which rules to deploy
          RULES_TO_DEPLOY=""
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -q 'database\.rules\.json'; then
            RULES_TO_DEPLOY="database:rules"
          fi
          if git diff-tree --no-commit-id --name-only -r HEAD | grep -q 'firestore\.rules'; then
            if [ -n "$RULES_TO_DEPLOY" ]; then
              RULES_TO_DEPLOY="$RULES_TO_DEPLOY,firestore:rules"
            else
              RULES_TO_DEPLOY="firestore:rules"
            fi
          fi

          if [ -n "$PROJECT_ID" ]; then
            firebase deploy --only "$RULES_TO_DEPLOY" --project "$PROJECT_ID"
          else
            firebase deploy --only "$RULES_TO_DEPLOY"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
